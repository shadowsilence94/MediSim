# ============================================================
# GitHub Actions: Auto-deploy to Hugging Face Spaces
# Triggers on every push to `main` branch.
# Syncs the full repo to HF Space (Docker SDK).
#
# Required GitHub Secrets:
#   HF_TOKEN — Hugging Face access token (write permission)
# ============================================================
name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli upload shadowsilence/medisim . . --repo-type space --exclude "reports/*" --exclude "MyWorks/*" --exclude ".github/*" --exclude ".git/*"
